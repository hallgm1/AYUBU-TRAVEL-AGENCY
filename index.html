<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYOUB TRAVEL AGENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl flex flex-col">
        <header class="bg-[#0a4d2e] text-white p-8 text-center rounded-b-[3rem] shadow-lg">
            <h1 class="text-3xl font-black tracking-tight">AYOUB TRAVEL</h1>
            <p class="text-xs uppercase tracking-[0.3em] opacity-90 mt-1">Booking Portal</p>
        </header>

        <div class="p-8 space-y-6 flex-grow">
            <section>
                <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Passenger Name</label>
                <input type="text" id="name" placeholder="e.g. GERALD MAPINDUZI HALL" 
                    class="w-full mt-1 p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none focus:border-green-600 focus:bg-white transition-all uppercase">
            </section>

            <section>
                <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Route (Travel From - To)</label>
                <input type="text" id="route" placeholder="e.g. Dar es Salaam - Dodoma" 
                    class="w-full mt-1 p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none focus:border-green-600 focus:bg-white transition-all">
            </section>

            <section>
                <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Travel Date</label>
                <input type="date" id="date" class="w-full mt-1 p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none focus:border-green-600 focus:bg-white">
            </section>

            <div class="bg-slate-900 text-white p-6 rounded-[2rem] shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <div class="flex items-center justify-between mb-2">
                        <span class="text-[10px] font-black text-green-400 uppercase tracking-widest">Official Payment</span>
                        <span class="text-[10px] font-bold bg-white/10 px-2 py-1 rounded">VODICOM M-PESA</span>
                    </div>
                    <p class="text-sm opacity-70">Lipa Number</p>
                    <p class="text-3xl font-mono font-black tracking-tighter">5266238</p>
                    <p class="text-[11px] mt-2 font-medium text-gray-400">MERCHANT: AYOUB MWAKITEGA</p>
                </div>
                <div class="absolute -right-4 -bottom-4 w-24 h-24 bg-green-600 rounded-full opacity-20"></div>
            </div>
        </div>

        <div class="p-8 pt-0 space-y-4">
            <button onclick="sendRequest('whatsapp')" 
                class="w-full bg-[#25D366] hover:bg-[#128C7E] text-white font-bold py-5 rounded-2xl shadow-lg transition-all active:scale-95 flex items-center justify-center space-x-2">
                <span class="text-lg">Book via WhatsApp</span>
            </button>
            <p class="text-center text-[10px] text-gray-400 font-medium italic">
                *NB: Send payment screenshot to confirm booking*
            </p>
        </div>
    </div>

    <script>
        const ayoubPhone = "255714080650";

        function sendRequest(method) {
            const name = document.getElementById('name').value.toUpperCase();
            const route = document.getElementById('route').value;
            const date = document.getElementById('date').value;

            if(!name || !route || !date) {
                alert("Please fill in all details.");
                return;
            }

            // Professional Response Template for Ayoub
            const message = `*AYOUB TRAVEL REQUEST*%n` +
                          `--------------------------%n` +
                          `PASSENGER: ${name}%n` +
                          `ROUTE: ${route}%n` +
                          `DATE: ${date}%n` +
                          `--------------------------%n` +
                          `*AYOUB REPLY:*%n` +
                          `PASSENGER: ${name}%n` +
                          `BUS INFO: [ ]%n` +
                          `VEHICLE REG: [ ]%n` +
                          `ROUTE: ${route}%n` +
                          `DATE: ${date}%n` +
                          `SEAT: [ ]%n` +
                          `FARE: [TZS. ]%n` +
                          `REPORT: [05:00 HRS]%n` +
                          `M-PESA LIPA NO: 5266238`;

            window.open(`https://wa.me/${ayoubPhone}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>
</body>
</html>
