<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYOUB TRAVEL AGENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-xl flex flex-col">
        <header class="bg-[#0a4d2e] text-white p-8 text-center rounded-b-[2.5rem] shadow-md">
            <h1 class="text-3xl font-black tracking-tighter uppercase">Ayoub Travel</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] opacity-80 mt-1">Agent Tanzania</p>
        </header>

        <div class="p-8 space-y-6 flex-grow">
            <div class="space-y-5">
                <section>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Passenger Name</label>
                    <input type="text" id="name" placeholder="FULL NAME" 
                        class="w-full mt-1 p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none focus:border-green-600 uppercase">
                </section>

                <section>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Route</label>
                    <input type="text" id="route" placeholder="e.g. DAR-CHALINZE" 
                        class="w-full mt-1 p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none focus:border-green-600 uppercase">
                </section>

                <section>
                    <label class="text-[11px] font-bold text-gray-400 uppercase tracking-widest ml-1">Travel Date</label>
                    <input type="date" id="date" class="w-full mt-1 p-4 bg-gray-50 border-2 border-gray-100 rounded-2xl outline-none focus:border-green-600">
                </section>
            </div>

            <div class="bg-blue-600 p-6 rounded-[2rem] text-white shadow-lg">
                <p class="text-[10px] font-bold opacity-80 uppercase mb-1">Payment Method</p>
                <p class="text-xs">M-PESA LIPA NO:</p>
                <p class="text-3xl font-mono font-black">5266238</p>
                <p class="text-[10px] mt-2 opacity-70 italic uppercase">NB: Send screenshot to confirm payment</p>
            </div>
        </div>

        <div class="p-8 pt-0">
            <button onclick="sendWhatsApp()" 
                class="w-full bg-[#25D366] hover:bg-[#128C7E] text-white font-bold py-5 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center space-x-2 uppercase tracking-wide">
                Book via WhatsApp
            </button>
        </div>
    </div>

    <script>
        function sendWhatsApp() {
            const name = document.getElementById('name').value.trim().toUpperCase();
            let routeInput = document.getElementById('route').value.trim().toUpperCase();
            const dateInput = document.getElementById('date').value;

            if(!name || !routeInput || !dateInput) {
                alert("Please fill in all details.");
                return;
            }

            // Logic to force "DAR-CHALINZE" format regardless of input
            // 1. Remove all existing spaces
            // 2. Ensure exactly one dash exists
            let cleanRoute = routeInput.replace(/\s+/g, ''); // Removes all spaces
            if (!cleanRoute.includes('-')) {
                // If they forgot the dash, we'll try to find a natural break or just alert them
                // but since you want it simple, we'll just ensure it joins correctly if they used a space
                cleanRoute = routeInput.replace(/\s+/g, '-'); 
            } else {
                // If they included a dash and spaces, this fixes it to "FROM-TO"
                let parts = cleanRoute.split('-');
                cleanRoute = parts[0] + "-" + parts[1];
            }

            // Format Date to DD-MM-YYYY
            let formattedDate = "DD-MM-YYYY";
            if(dateInput) {
                const [y, m, d] = dateInput.split('-');
                formattedDate = `${d}-${m}-${y}`;
            }

            const ayoubPhone = "255714080650";

            const text = `*AYOUB TRAVEL REQUEST*\n` +
                         `*PASSENGER:* ${name}\n` +
                         `*ROUTE:* ${cleanRoute}\n` +
                         `*DATE:* ${formattedDate}\n\n` +
                         `*AYOUB REPLY:*\n` +
                         `*PASSENGER:* ${name}\n` +
                         `*BUS INFO:* [ ]\n` +
                         `*VEHICLE REG:* [ ]\n` +
                         `*ROUTE:* ${cleanRoute}\n` +
                         `*DATE:* ${formattedDate}\n` +
                         `*SEAT:* [ ]\n` +
                         `*FARE:* [TZS. ]\n` +
                         `*REPORT:* [05:00 HRS]\n` +
                         `*M-PESA LIPA NO:* 5266238\n` +
                         `*NB:* PLEASE SEND SCREENSHOT FOR PAYMENT CONFIRMATION AFTER RECEIVING COMPLETE TRAVEL DETAILS.`;

            window.open(`https://wa.me/${ayoubPhone}?text=${encodeURIComponent(text)}`, '_blank');
        }
    </script>
</body>
</html>
